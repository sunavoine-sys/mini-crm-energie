<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CRM Documents</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 40px;
    }
    h1 { margin-bottom: 20px; }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      margin-left: 10px;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>📂 Documents</h1>

<input type="file" id="fileInput" />
<button onclick="upload()">Uploader</button>

<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
  "https://bbghzarbawbugrmwlxjj.supabase.co",
  "sb_publishable_Rfr6TeYwOI3jIseYVT70BQ_fYCgCD3p"
);

async function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Choisis un fichier");

  const { error } = await supabase.storage
    .from("Documents")
    .upload("files/" + file.name, file);

  if (error) return alert(error.message);

  alert("Upload OK");
  loadFiles();
}

async function loadFiles() {
  const { data, error } = await supabase.storage
    .from("Documents")
    .list("files");

  if (error) return console.error(error);

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(file => {
    const url = supabase.storage
      .from("Documents")
      .getPublicUrl("files/" + file.name).data.publicUrl;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <span>${file.name}</span>
      <div>
        <button onclick="openFile('${url}')">Ouvrir</button>
        <button onclick="deleteFile('${file.name}')">Supprimer</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function openFile(url) {
  window.open(url, "_blank");
}

async function deleteFile(name) {
  await supabase.storage
    .from("Documents")
    .remove(["files/" + name]);

  loadFiles();
}

loadFiles();
</script>

</body>
</html>
