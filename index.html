<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Documents</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button { margin-left: 5px; }
  </style>
</head>
<body>

  <h1>📁 Documents</h1>

  <input type="file" id="fileInput" />
  <button id="uploadBtn">Uploader</button>

  <p id="msg"></p>

  <div id="fileList"></div>

  <script>
    const SUPABASE_URL = "https://bbghzarbawbugrmwlxjj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Rfr6TeYwOI3jIseYVT70BQ_fYCgCD3p";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const listEl = document.getElementById("fileList");
    const msg = document.getElementById("msg");

    function setMsg(t) {
      msg.textContent = t;
    }

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) return setMsg("Choisis un fichier.");

      setMsg("Upload en cours...");

      const filePath = "files/" + Date.now() + "-" + file.name;

      const { error } = await client.storage
        .from("Documents")
        .upload(filePath, file);

      if (error) {
        setMsg("Erreur upload: " + error.message);
        return;
      }

      setMsg("Upload réussi !");
      fileInput.value = "";
      loadFiles();
    });

    async function loadFiles() {
      setMsg("Chargement des fichiers...");
      const { data, error } = await client.storage
        .from("Documents")
        .list("files");

      if (error) {
        setMsg("Erreur liste: " + error.message);
        return;
      }

      listEl.innerHTML = "";

      if (!data || data.length === 0) {
        setMsg("Aucun fichier.");
        return;
      }

      setMsg("Fichiers chargés.");

      data.forEach((file) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <span>${file.name}</span>
          <div>
            <button data-open="${file.name}">Ouvrir</button>
            <button data-delete="${file.name}">Supprimer</button>
          </div>
        `;

        listEl.appendChild(div);
      });

      // OUVRIR
      document.querySelectorAll("[data-open]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const name = btn.dataset.open;

          const { data, error } = await client.storage
            .from("Documents")
            .createSignedUrl("files/" + name, 3600);

          if (error) {
            setMsg("Erreur ouverture: " + error.message);
            return;
          }

          window.open(data.signedUrl, "_blank");
        });
      });

      // DELETE
      document.querySelectorAll("[data-delete]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const name = btn.dataset.delete;

          const { error } = await client.storage
            .from("Documents")
            .remove(["files/" + name]);

          if (error) {
            setMsg("Erreur suppression: " + error.message);
            return;
          }

          setMsg("Fichier supprimé.");
          loadFiles();
        });
      });
    }

    loadFiles();
  </script>

</body>
</html>
